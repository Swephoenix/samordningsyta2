<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Partiets Regelbok</title>

<style>

body{
font-family:Arial;
background:#f5f6fa;
margin:0;
}

.popup{
width:1000px;
height:650px;
margin:40px auto;
background:white;
border-radius:12px;
box-shadow:0 20px 60px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
background:#1b2a41;
color:white;
padding:16px 20px;
font-size:20px;
font-weight:bold;
}

.toolbar{
display:flex;
gap:10px;
padding:10px 20px;
border-bottom:1px solid #ddd;
background:#fafafa;
}

.toolbar input{
flex:1;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.content{
flex:1;
display:flex;
overflow:hidden;
}

.sidebar{
width:230px;
border-right:1px solid #ddd;
background:#fafafa;
padding:10px;
overflow:auto;
}

.category{
padding:8px;
border-radius:6px;
cursor:pointer;
}

.category:hover{
background:#e6eefc;
}

.main{
flex:1;
padding:20px;
overflow:auto;
}

.rule{
border:1px solid #ddd;
border-radius:8px;
padding:12px;
margin-bottom:12px;
background:white;
}

.rule-title{
font-weight:bold;
margin-bottom:6px;
}

.explanation{
background:#f9f9f9;
border-left:4px solid #3c7dd9;
padding:10px;
margin-top:8px;
border-radius:4px;
font-size:14px;
}

.chatbot{
width:280px;
border-left:1px solid #ddd;
background:#fafafa;
display:flex;
flex-direction:column;
}

.chat-header{
padding:10px;
font-weight:bold;
border-bottom:1px solid #ddd;
}

.chat-window{
flex:1;
padding:10px;
overflow:auto;
font-size:14px;
}

.chat-input{
border-top:1px solid #ddd;
padding:10px;
}

.chat-input input{
width:100%;
padding:6px;
}

.footer{
padding:8px 20px;
border-top:1px solid #ddd;
font-size:12px;
background:#fafafa;
}

</style>
</head>

<body>

<div class="popup">

<div class="header">
📘 Partiets Regelbok
</div>

<div class="toolbar">
<input type="text" id="search" placeholder="Sök regler, stadgar eller processer...">
</div>

<div class="content">

<div class="sidebar">

<div class="category" onclick="filterCategory('alla')">Alla regler</div>
<div class="category" onclick="filterCategory('organisation')">Organisation</div>
<div class="category" onclick="filterCategory('medlemskap')">Medlemskap</div>
<div class="category" onclick="filterCategory('kommunikation')">Kommunikation</div>
<div class="category" onclick="filterCategory('valarbete')">Valarbete</div>

</div>


<div class="main" id="rules"></div>


<div class="chatbot">

<div class="chat-header">
🤖 Regelassistent
</div>

<div class="chat-window">
Hej!  
Ställ en fråga om partiets regler eller stadgar.
</div>

<div class="chat-input">
<input placeholder="Fråga regelassistenten...">
</div>

</div>


</div>

<div class="footer">
Pedagogisk regelbok • Demo
</div>

</div>


<script>

const rules=[

{
title:"1. Organisation",
category:"organisation",
text:"Partiet organiseras i nationell nivå, regionnivå och lokal nivå.",
explanation:"Det betyder att partiet har tre nivåer av beslut. Lokala föreningar hanterar lokala frågor medan nationella beslut tas centralt."
},

{
title:"2. Medlemskap",
category:"medlemskap",
text:"Medlemskap beviljas personer som accepterar partiets stadgar och värdegrund.",
explanation:"Medlemskap innebär rätt att delta i möten och bidra till partiets arbete."
},

{
title:"3. Kommunikation",
category:"kommunikation",
text:"Officiella uttalanden görs av utsedda talespersoner.",
explanation:"Detta förhindrar att olika budskap sprids samtidigt."
},

{
title:"4. Valarbete",
category:"valarbete",
text:"Valorganisationen ansvarar för kampanjstrategi och material.",
explanation:"Valgruppen samordnar aktiviteter inför val."
}

];


function render(list){

const container=document.getElementById("rules");
container.innerHTML="";

list.forEach(r=>{

container.innerHTML+=`

<div class="rule">

<div class="rule-title">${r.title}</div>

<div>${r.text}</div>

<div class="explanation">

<b>Förklaring:</b><br>
${r.explanation}

</div>

</div>

`;

});

}

render(rules);



document.getElementById("search").addEventListener("input",function(){

const q=this.value.toLowerCase();

const filtered=rules.filter(r=>

r.title.toLowerCase().includes(q) ||
r.text.toLowerCase().includes(q) ||
r.explanation.toLowerCase().includes(q)

);

render(filtered);

});


function filterCategory(cat){

if(cat==="alla"){
render(rules);
return;
}

const filtered=rules.filter(r=>r.category===cat);
render(filtered);

}

</script>

</body>
</html>
