<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viktiga Meddelanden – Spelkort</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#2563eb;
  --blue-deep:#1e3a8a;
  --yellow:#facc15;
  --yellow-soft:#fde047;
  --bg:#f8fafc;
  --text:#0f172a;
  --muted:#64748b;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Inter,sans-serif;
  background:linear-gradient(135deg,#e0f2fe 0%,#fef9c3 100%);
  display:flex;
  justify-content:center;
  padding:50px 20px;
  color:var(--text);
}

.wrapper{
  width:460px;
}

.section{
  background:white;
  border-radius:24px;
  padding:26px;
  box-shadow:0 30px 70px rgba(0,0,0,0.08);
  margin-bottom:28px;
}

.section h2{
  font-size:18px;
  font-weight:800;
  margin-bottom:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.edit{
  font-size:12px;
  padding:8px 14px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,var(--blue),#3b82f6);
  color:white;
  cursor:pointer;
}

.notice{
  background:#e2e8f0;
  border-left:5px solid var(--blue);
  padding:14px;
  border-radius:14px;
  margin-bottom:12px;
  font-weight:500;
}

/* Spelkort */

.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.card{
  position:relative;
  height:180px;
  border-radius:22px;
  padding:18px;
  cursor:pointer;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:0.35s;
  background:linear-gradient(135deg,var(--yellow),var(--yellow-soft));
  box-shadow:0 15px 30px rgba(250,204,21,0.35);
}

.card.blue{
  background:linear-gradient(135deg,var(--blue),var(--blue-deep));
  box-shadow:0 15px 30px rgba(37,99,235,0.35);
  color:white;
}

.card:hover{
  transform:translateY(-10px) rotate(-1deg) scale(1.03);
}

.card::after{
  content:"";
  position:absolute;
  width:140px;
  height:140px;
  background:rgba(255,255,255,0.15);
  border-radius:50%;
  top:-40px;
  right:-40px;
}

.card h3{
  font-size:16px;
  font-weight:800;
}

.card p{
  font-size:13px;
  opacity:0.9;
}

.badge{
  align-self:flex-start;
  padding:6px 10px;
  border-radius:20px;
  font-size:11px;
  font-weight:700;
  background:white;
  color:var(--blue);
}

.card.blue .badge{
  background:rgba(255,255,255,0.2);
  color:white;
}

/* Popup */

.modal{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  width:460px;
  background:white;
  border-radius:24px;
  padding:28px;
  box-shadow:0 40px 80px rgba(0,0,0,0.3);
  animation:pop 0.3s ease;
}

@keyframes pop{
  from{opacity:0; transform:scale(0.9);}
  to{opacity:1; transform:scale(1);}
}

.modal-box h3{
  margin-bottom:14px;
  font-size:20px;
}

.modal-box img{
  width:100%;
  border-radius:16px;
  margin:16px 0;
}

.close{
  margin-top:16px;
  padding:12px;
  border:none;
  border-radius:14px;
  width:100%;
  font-weight:700;
  background:linear-gradient(135deg,var(--blue),#3b82f6);
  color:white;
  cursor:pointer;
}

</style>
</head>
<body>

<div class="wrapper">

  <div class="section">
    <h2>
      Viktiga Meddelanden
      <button class="edit">Redigera</button>
    </h2>

    <div class="notice">Systemuppdatering inatt kl 02:00</div>
    <div class="notice">Deadline för Q3-rapporten är på fredag</div>
  </div>

  <div class="section">
    <h2>Uppdrag</h2>

    <div class="cards">

      <div class="card"
        onclick="openModal(
          'Skapa Q3-rapport',
          'Sammanställ alla avdelningars data och säkerställ kvalitet innan deadline.',
          'https://picsum.photos/600/350?1'
        )">

        <span class="badge">Deadline</span>
        <h3>Q3-rapport</h3>
        <p>Sammanställ siffror och analysera resultat.</p>

      </div>

      <div class="card blue"
        onclick="openModal(
          'Säkerhetsgranskning',
          'Gå igenom användarbehörigheter och säkerställ att filsystemet är korrekt konfigurerat.',
          'https://picsum.photos/600/350?2'
        )">

        <span class="badge">Prioritet</span>
        <h3>Säkerhet</h3>
        <p>Fullständig genomgång denna vecka.</p>

      </div>

    </div>

  </div>

</div>

<!-- Popup -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="title"></h3>
    <p id="text"></p>
    <img id="image" style="display:none;">
    <button class="close" onclick="closeModal()">Stäng</button>
  </div>
</div>

<script>
function openModal(title,text,image){
  document.getElementById("title").innerText = title;
  document.getElementById("text").innerText = text;

  const img = document.getElementById("image");
  if(image){
    img.src = image;
    img.style.display = "block";
  } else {
    img.style.display = "none";
  }

  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

window.onclick = function(e){
  if(e.target.classList.contains("modal")){
    closeModal();
  }
}
</script>

</body>
</html>
